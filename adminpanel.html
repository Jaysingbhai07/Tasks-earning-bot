<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .sidebar-active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="lg:flex min-h-screen">
    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900 p-6 text-center">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl">
            <h1 class="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter italic">Admin Access</h1>
            <input type="text" id="adm-u" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border-none outline-none font-bold text-center">
            <input type="password" id="adm-p" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl mb-8 border-none outline-none font-bold text-center">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl">LOG IN</button>
        </div>
    </div>

    <div id="admin-hub" class="hidden flex flex-col lg:flex-row min-h-screen w-full">
        <aside class="bg-white lg:w-72 border-r p-6 sticky top-0 lg:h-screen flex lg:flex-col gap-2">
            <div class="mb-10 px-2 font-black text-xl text-slate-800 tracking-tighter"><i class="fas fa-bolt text-blue-600"></i> MASTER CONTROL</div>
            <button onclick="showTab('stats')" id="btn-stats" class="sidebar-active flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-chart-pie"></i> Stats</button>
            <button onclick="showTab('missions')" id="btn-missions" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-tasks"></i> Missions</button>
            <button onclick="showTab('direct')" id="btn-direct" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-link"></i> Direct Ads</button>
            <button onclick="showTab('payouts')" id="btn-payouts" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-wallet"></i> Payouts</button>
            <button onclick="showTab('settings')" id="btn-settings" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-cog"></i> Settings</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto max-w-6xl mx-auto">
            <!-- OVERVIEW -->
            <section id="tab-stats" class="tab-content active text-center">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border"><p class="text-xs text-slate-400 font-black uppercase mb-1">Users</p><h3 id="stat-u" class="text-4xl font-black">0</h3></div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-orange-100 text-center"><p class="text-xs text-slate-400 font-black uppercase mb-1">Pending Wdr</p><h3 id="stat-p" class="text-4xl font-black text-orange-500">0</h3></div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-green-100 text-center"><p class="text-xs text-slate-400 font-black uppercase mb-1">Total Paid</p><h3 id="stat-w" class="text-4xl font-black text-green-600">₹0</h3></div>
                </div>
            </section>

            <!-- MISSION MANAGER -->
            <section id="tab-missions" class="tab-content">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm mb-10">
                    <h2 class="text-xl font-black mb-6">Create Mission Task</h2>
                    <div class="grid lg:grid-cols-2 gap-4"><input id="t-n" type="text" placeholder="Name" class="p-4 bg-slate-50 rounded-2xl font-bold"><input id="t-r" type="number" placeholder="Coins" class="p-4 bg-slate-50 rounded-2xl font-bold"><input id="t-l" type="text" placeholder="URL Link" class="p-4 bg-slate-50 rounded-2xl font-bold lg:col-span-2"><button onclick="saveItem('tasks','t')" class="bg-blue-600 text-white py-4 rounded-2xl font-black lg:col-span-2">PUBLISH TASK</button></div>
                </div>
                <div id="tasks-grid" class="grid lg:grid-cols-2 gap-4"></div>
            </section>

            <!-- DIRECT AD MANAGER -->
            <section id="tab-direct" class="tab-content">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm mb-10 border-2 border-dashed border-indigo-200">
                    <h2 class="text-xl font-black mb-6 italic">Add Direct Ad (Monetag)</h2>
                    <div class="grid lg:grid-cols-2 gap-4"><input id="d-n" type="text" placeholder="Ad Label" class="p-4 bg-slate-50 rounded-2xl font-bold"><input id="d-r" type="number" placeholder="Reward Coins" class="p-4 bg-slate-50 rounded-2xl font-bold"><input id="d-l" type="text" placeholder="Direct Link URL" class="p-4 bg-slate-50 rounded-2xl font-bold lg:col-span-2"><button onclick="saveItem('ads_direct','d')" class="bg-indigo-600 text-white py-4 rounded-2xl font-black lg:col-span-2 shadow-lg">SAVE DIRECT LINK</button></div>
                </div>
                <div id="direct-grid" class="grid lg:grid-cols-2 gap-4"></div>
            </section>

            <!-- PAYOUTS -->
            <section id="tab-payouts" class="tab-content">
                <div class="bg-white rounded-[2rem] border overflow-hidden shadow-sm"><table class="w-full text-left font-bold text-sm"><tbody id="payout-table"></tbody></table></div>
            </section>

            <!-- SETTINGS -->
            <section id="tab-settings" class="tab-content">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-800 mb-8 uppercase italic">App Config</h2>
                    <div class="grid lg:grid-cols-2 gap-6 mb-8">
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400">₹1 = ? Coins</label><input type="number" id="cfg-rate" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400">Min Withdraw ₹</label><input type="number" id="cfg-min" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold"></div>
                    </div>
                    <button onclick="saveConfig()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black shadow-xl">SAVE GLOBAL CONFIG</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU", authDomain: "tasksearningsbot.firebaseapp.com", projectId: "tasksearningsbot", storageBucket: "tasksearningsbot.firebasestorage.app", messagingSenderId: "721160571309", appId: "1:721160571309:web:35d389bf57f511e6a73924" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function login() {
            if(document.getElementById('adm-u').value === "jsbotwolde" && document.getElementById('adm-p').value === "12345678") {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('admin-hub').classList.remove('hidden');
                initMaster();
            } else Swal.fire('Error', 'Access Denied', 'error');
        }

        function initMaster() {
            db.collection('users').onSnapshot(snap => {
                document.getElementById('stat-u').innerText = snap.size;
                let paid = 0; snap.forEach(d => paid += (d.data().totalWithdrawals || 0));
                document.getElementById('stat-w').innerText = '₹' + paid;
            });
            db.collection('withdrawals').where('status','==','pending').onSnapshot(snap => {
                document.getElementById('stat-p').innerText = snap.size;
                document.getElementById('payout-table').innerHTML = snap.docs.map(doc => `<tr class="border-b"><td class="p-6 font-black text-blue-600 uppercase text-[10px]">#${doc.data().userId}</td><td class="p-6 font-black">₹${doc.data().amount}</td><td class="p-6 text-center"><button onclick="db.collection('withdrawals').doc('${doc.id}').update({status:'approved'})" class="bg-green-500 text-white p-2 px-4 rounded-lg font-black uppercase text-[10px]">Approve</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center text-slate-300 font-black uppercase tracking-widest italic">No pending requests</td></tr>';
            });
            loadCollection('tasks', 'tasks-grid'); loadCollection('ads_direct', 'direct-grid');
            db.collection('settings').doc('global').get().then(doc => { if(doc.exists) { document.getElementById('cfg-rate').value = doc.data().coin_rate; document.getElementById('cfg-min').value = doc.data().min_withdrawal; } });
        }

        async function saveItem(col, prefix) {
            const data = { createdAt: firebase.firestore.FieldValue.serverTimestamp(), name: document.getElementById(prefix+'-n').value, reward: parseInt(document.getElementById(prefix+'-r').value), link: document.getElementById(prefix+'-l').value };
            await db.collection(col).add(data);
            Swal.fire('Done!', 'System updated successfully', 'success');
        }

        function loadCollection(col, gridId) {
            db.collection(col).orderBy('createdAt','desc').onSnapshot(snap => {
                document.getElementById(gridId).innerHTML = snap.docs.map(doc => `<div class="bg-white p-5 rounded-3xl border flex items-center justify-between mb-2"><div><h4 class="font-bold text-xs uppercase text-slate-700">${doc.data().name}</h4><p class="text-blue-600 font-black text-xs">${doc.data().reward} Coins</p></div><button onclick="db.collection('${col}').doc('${doc.id}').delete()" class="text-red-400 p-2"><i class="fas fa-trash"></i></button></div>`).join('');
            });
        }

        async function saveConfig() {
            await db.collection('settings').doc('global').set({ coin_rate: parseInt(document.getElementById('cfg-rate').value), min_withdrawal: parseInt(document.getElementById('cfg-min').value) });
            Swal.fire('Saved!', 'Global configuration updated', 'success');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('sidebar-active','text-white'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('sidebar-active','text-white');
        }
    </script>
</body>
</html>
