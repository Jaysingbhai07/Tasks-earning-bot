<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Tasks Earnings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        #login-screen { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
    </style>
</head>
<body>
    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3"><i class="fas fa-lock text-3xl"></i></div>
            <h1 class="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Master Access</h1>
            <input type="text" id="adm-u" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border-none outline-none font-bold">
            <input type="password" id="adm-p" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl mb-8 border-none outline-none font-bold">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition">SIGN IN</button>
        </div>
    </div>

    <div id="admin-app" class="hidden flex flex-col lg:flex-row min-h-screen">
        <aside class="bg-white lg:w-72 border-r p-6 sticky top-0 lg:h-screen flex lg:flex-col gap-2">
            <div class="hidden lg:flex items-center gap-3 mb-10"><div class="bg-blue-600 w-10 h-10 rounded-xl text-white flex items-center justify-center"><i class="fas fa-bolt"></i></div><span class="font-black text-xl text-slate-800">JSBOT HUB</span></div>
            <button onclick="switchTab('dashboard')" id="n-dashboard" class="sidebar-active flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all w-full text-left"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button onclick="switchTab('settings')" id="n-settings" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all w-full text-left"><i class="fas fa-sliders-h"></i> Control</button>
            <button onclick="switchTab('tasks')" id="n-tasks" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all w-full text-left"><i class="fas fa-tasks"></i> Missions</button>
            <button onclick="switchTab('withdrawals')" id="n-withdrawals" class="text-slate-400 flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all w-full text-left"><i class="fas fa-wallet"></i> Payouts</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto max-w-6xl mx-auto">
            <section id="tab-dashboard" class="tab-content active">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10 text-center font-black">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-50"><p class="text-[10px] text-slate-400 uppercase mb-1">Users</p><h3 id="stat-u" class="text-4xl text-slate-800">0</h3></div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-orange-100"><p class="text-[10px] text-slate-400 uppercase mb-1">Pending</p><h3 id="stat-p" class="text-4xl text-orange-500">0</h3></div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-green-100"><p class="text-[10px] text-slate-400 uppercase mb-1">Total Paid</p><h3 id="stat-w" class="text-4xl text-green-600">₹0</h3></div>
                </div>
            </section>

            <section id="tab-settings" class="tab-content">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-800 mb-8">System Control</h2>
                    <div class="grid lg:grid-cols-3 gap-6 mb-8">
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400">1₹ = ? Coins</label><input type="number" id="cfg-rate" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400">Ad Bonus</label><input type="number" id="cfg-ad" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400">Min Wdr ₹</label><input type="number" id="cfg-min" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold"></div>
                    </div>
                    <button onclick="saveConfig()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl">SAVE SETTINGS</button>
                </div>
            </section>

            <section id="tab-tasks" class="tab-content">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm mb-10">
                    <h2 id="task-title" class="text-2xl font-black text-slate-800 mb-6">New Task (Required Link)</h2>
                    <input type="hidden" id="edit-id">
                    <div class="grid lg:grid-cols-2 gap-4 mb-6">
                        <input id="t-n" type="text" placeholder="Mission Name" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <input id="t-r" type="number" placeholder="Reward (Coins)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <input id="t-l" type="text" placeholder="https://link-to-target.com" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold lg:col-span-2">
                    </div>
                    <div class="flex gap-4">
                        <button onclick="saveTask()" id="btn-t" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg">PUBLISH</button>
                        <button onclick="cancelEdit()" id="btn-c" class="hidden bg-slate-200 text-slate-600 px-10 py-4 rounded-2xl font-black">CANCEL</button>
                    </div>
                </div>
                <div id="task-grid" class="grid lg:grid-cols-2 gap-6"></div>
            </section>

            <section id="tab-withdrawals" class="tab-content">
                <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400"><tr class="border-b"><th class="px-8 py-6">UID</th><th class="px-8 py-6">UPI</th><th class="px-8 py-6">Amount</th><th class="px-8 py-6">Action</th></tr></thead>
                        <tbody id="payout-table" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU",
            authDomain: "tasksearningsbot.firebaseapp.com",
            projectId: "tasksearningsbot",
            storageBucket: "tasksearningsbot.firebasestorage.app",
            messagingSenderId: "721160571309",
            appId: "1:721160571309:web:35d389bf57f511e6a73924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function login() {
            const u = document.getElementById('adm-u').value;
            const p = document.getElementById('adm-p').value;
            if(u === "jsbotwolde" && p === "12345678") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-app').classList.remove('hidden');
                startHub();
            } else Swal.fire('Error', 'Invalid Access', 'error');
        }

        function startHub() {
            db.collection('users').onSnapshot(snap => {
                document.getElementById('stat-u').innerText = snap.size;
                let paid = 0; snap.forEach(d => { paid += (d.data().totalWithdrawals || 0); });
                document.getElementById('stat-w').innerText = `₹${paid}`;
            });
            db.collection('withdrawals').where('status','==','pending').onSnapshot(snap => {
                document.getElementById('stat-p').innerText = snap.size;
                document.getElementById('payout-table').innerHTML = snap.docs.map(doc => {
                    const w = doc.data();
                    return `<tr class="border-b"><td class="px-8 py-6 font-bold text-blue-600">#${w.userId}</td><td class="px-8 py-6 text-slate-400 font-bold">${w.upi}</td><td class="px-8 py-6 font-black">₹${w.amount}</td><td class="px-8 py-6"><button onclick="procW('${doc.id}')" class="bg-green-500 text-white p-2 rounded-lg"><i class="fas fa-check"></i></button></td></tr>`;
                }).join('');
            });
            db.collection('settings').doc('global').onSnapshot(doc => {
                if(doc.exists) {
                    const d = doc.data();
                    document.getElementById('cfg-rate').value = d.coin_rate;
                    document.getElementById('cfg-ad').value = d.ads_reward;
                    document.getElementById('cfg-min').value = d.min_withdrawal;
                }
            });
            loadTasks();
        }

        async function saveConfig() {
            const r = parseInt(document.getElementById('cfg-rate').value);
            const a = parseInt(document.getElementById('cfg-ad').value);
            const m = parseInt(document.getElementById('cfg-min').value);
            await db.collection('settings').doc('global').set({ coin_rate: r, ads_reward: a, min_withdrawal: m });
            Swal.fire('Success', 'System configuration updated', 'success');
        }

        async function saveTask() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('t-n').value;
            const reward = parseInt(document.getElementById('t-r').value);
            const link = document.getElementById('t-l').value;
            if(!name || !reward || !link) return;

            if(id) await db.collection('tasks').doc(id).update({ name, reward, link });
            else await db.collection('tasks').add({ name, reward, link, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            cancelEdit();
            Swal.fire('Task Live', '', 'success');
        }

        function loadTasks() {
            db.collection('tasks').onSnapshot(snap => {
                document.getElementById('task-grid').innerHTML = snap.docs.map(doc => {
                    const t = doc.data();
                    return `<div class="bg-white p-6 rounded-3xl border flex items-center justify-between shadow-sm"><div><h4 class="font-bold text-slate-800 uppercase text-xs">${t.name}</h4><p class="text-blue-600 font-black text-sm">${t.reward} Coins</p></div><div class="flex gap-2"><button onclick="editT('${doc.id}','${t.name}',${t.reward},'${t.link}')" class="p-3 bg-slate-50 rounded-xl text-slate-400"><i class="fas fa-edit"></i></button><button onclick="db.collection('tasks').doc('${doc.id}').delete()" class="p-3 bg-slate-50 rounded-xl text-red-400"><i class="fas fa-trash"></i></button></div></div>`;
                }).join('');
            });
        }

        function editT(id, n, r, l) {
            document.getElementById('edit-id').value = id; document.getElementById('t-n').value = n; document.getElementById('t-r').value = r; document.getElementById('t-l').value = l;
            document.getElementById('task-title').innerText = "Update Mission"; document.getElementById('btn-t').innerText = "UPDATE"; document.getElementById('btn-c').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = ''; document.getElementById('t-n').value = ''; document.getElementById('t-r').value = ''; document.getElementById('t-l').value = '';
            document.getElementById('task-title').innerText = "New Task"; document.getElementById('btn-t').innerText = "PUBLISH"; document.getElementById('btn-c').classList.add('hidden');
        }

        async function procW(id) {
            await db.collection('withdrawals').doc(id).update({ status: 'approved' });
            Swal.fire('Payout Approved!', '', 'success');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('sidebar-active','text-white'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`n-${id}`).classList.add('sidebar-active','text-white');
        }
    </script>
</body>
</html>
