<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Tasks Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .sidebar-active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        #login-overlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <!-- LOGIN MODAL -->
    <div id="login-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6 text-center">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl">
            <h1 class="text-3xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Admin Access</h1>
            <input type="text" id="adm-u" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 border-2 border-transparent focus:border-blue-500 outline-none transition">
            <input type="password" id="adm-p" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl mb-8 border-2 border-transparent focus:border-blue-500 outline-none transition">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition">LOGIN</button>
        </div>
    </div>

    <!-- MAIN HUB -->
    <div id="admin-hub" class="hidden flex flex-col lg:flex-row min-h-screen">
        <aside class="bg-white lg:w-72 border-r p-6 sticky top-0 lg:h-screen flex lg:flex-col gap-2 overflow-x-auto lg:overflow-visible">
            <button onclick="switchTab('dashboard')" id="n-dashboard" class="sidebar-active flex-shrink-0 lg:flex-none flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button onclick="switchTab('control')" id="n-control" class="text-slate-400 flex-shrink-0 lg:flex-none flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-sliders-h"></i> Control</button>
            <button onclick="switchTab('tasks')" id="n-tasks" class="text-slate-400 flex-shrink-0 lg:flex-none flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-tasks"></i> Missions</button>
            <button onclick="switchTab('payouts')" id="n-payouts" class="text-slate-400 flex-shrink-0 lg:flex-none flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-indian-rupee-sign"></i> Payouts</button>
            <button onclick="switchTab('users')" id="n-users" class="text-slate-400 flex-shrink-0 lg:flex-none flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all"><i class="fas fa-users-cog"></i> Users</button>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto max-w-6xl mx-auto">
            <!-- DASHBOARD -->
            <section id="tab-dashboard" class="tab-content active">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center"><p class="text-[10px] text-slate-400 font-black uppercase mb-1">Users</p><h3 id="stat-u" class="text-4xl font-black text-slate-800">0</h3></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-orange-100 text-center"><p class="text-[10px] text-slate-400 font-black uppercase mb-1">Pending</p><h3 id="stat-p" class="text-4xl font-black text-orange-500">0</h3></div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-green-100 text-center"><p class="text-[10px] text-slate-400 font-black uppercase mb-1">Paid Out</p><h3 id="stat-w" class="text-4xl font-black text-green-600">₹0</h3></div>
                </div>
            </section>

            <!-- APP CONTROL -->
            <section id="tab-control" class="tab-content">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-800 mb-8">Global Settings</h2>
                    <div class="grid lg:grid-cols-3 gap-6 mb-10">
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase ml-2">₹1 = ? Coins</label><input type="number" id="cfg-rate" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-slate-700"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase ml-2">Ad Reward</label><input type="number" id="cfg-ad" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-slate-700"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase ml-2">Min Wdr (₹)</label><input type="number" id="cfg-min" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-black text-slate-700"></div>
                    </div>
                    <button onclick="saveConfig()" class="bg-blue-600 text-white px-12 py-5 rounded-3xl font-black shadow-xl">SAVE SETTINGS</button>
                </div>
            </section>
            
            <p class="mt-10 text-center text-slate-400 text-xs">Manage your bot from this secure dashboard.</p>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU",
            authDomain: "tasksearningsbot.firebaseapp.com",
            projectId: "tasksearningsbot",
            storageBucket: "tasksearningsbot.firebasestorage.app",
            messagingSenderId: "721160571309",
            appId: "1:721160571309:web:35d389bf57f511e6a73924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function login() {
            const u = document.getElementById('adm-u').value;
            const p = document.getElementById('adm-p').value;
            if(u === "jsbotwolde" && p === "12345678") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-hub').classList.remove('hidden');
                startHub();
            } else Swal.fire('Error', 'Invalid Login', 'error');
        }

        function startHub() {
            db.collection('users').onSnapshot(snap => {
                document.getElementById('stat-u').innerText = snap.size;
                let paid = 0; snap.forEach(d => { paid += (d.data().totalWithdrawals || 0); });
                document.getElementById('stat-w').innerText = `₹${paid}`;
            });
            db.collection('withdrawals').where('status','==','pending').onSnapshot(snap => document.getElementById('stat-p').innerText = snap.size);
            db.collection('settings').doc('global').get().then(doc => {
                if(doc.exists) {
                    const d = doc.data();
                    document.getElementById('cfg-rate').value = d.coin_rate;
                    document.getElementById('cfg-ad').value = d.ads_reward;
                    document.getElementById('cfg-min').value = d.min_withdrawal;
                }
            });
        }

        async function saveConfig() {
            const r = parseInt(document.getElementById('cfg-rate').value);
            const a = parseInt(document.getElementById('cfg-ad').value);
            const m = parseInt(document.getElementById('cfg-min').value);
            await db.collection('settings').doc('global').set({ coin_rate: r, ads_reward: a, min_withdrawal: m });
            Swal.fire('Updated', 'Settings Saved', 'success');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('sidebar-active','text-white'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`n-${id}`).classList.add('sidebar-active','text-white');
        }
    </script>
</body>
</html>
