<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasks Earnings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11003643' data-sdk='show_11003643'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; padding-bottom: 90px; user-select: none; }
        .tab-content { display: none; animation: slideUp 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #2563eb; }
    </style>
</head>
<body>
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-bold">Syncing Profile...</p>
    </div>

    <div class="p-4 max-w-md mx-auto">
        <!-- HEADER -->
        <div class="bg-white p-5 rounded-[2rem] shadow-sm flex items-center justify-between mb-6 border border-slate-50">
            <div class="flex items-center gap-3">
                <img id="u-pfp" src="https://ui-avatars.com/api/?name=User" class="w-12 h-12 rounded-2xl ring-4 ring-blue-50 shadow-sm">
                <div><h2 id="u-name" class="font-black text-slate-800 leading-tight">...</h2><p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest"><span id="u-coins">0</span> Coins</p></div>
            </div>
            <div class="text-right">
                <p class="text-[8px] font-black text-slate-300 uppercase">Rupees</p>
                <h3 class="text-xl font-black text-slate-800">₹<span id="u-rupees">0</span></h3>
            </div>
        </div>

        <!-- HOME TAB -->
        <section id="tab-home" class="tab-content active">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-[2.5rem] text-white shadow-xl mb-8">
                <h4 class="font-black text-xl mb-1 italic">INVITE & EARN</h4>
                <p class="text-[10px] opacity-80 mb-6 font-medium uppercase tracking-widest">Get 500 Coins for every friend</p>
                <button onclick="copyRef()" class="bg-white text-blue-600 px-8 py-3 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition">COPY LINK</button>
            </div>
            <h4 class="text-xs font-black text-slate-400 uppercase ml-2 mb-4">Missions</h4>
            <div id="task-list" class="space-y-4"></div>
        </section>

        <!-- TASKS TAB (ADS) -->
        <section id="tab-tasks" class="tab-content">
            <div class="bg-amber-100/50 border-2 border-dashed border-amber-300 p-6 rounded-[2.5rem] mb-6 flex items-center justify-between">
                <div><h4 class="font-black text-amber-900 uppercase text-xs">Ad Bonus</h4><p class="text-[10px] text-amber-700 font-bold">+<span id="conf-ad">0</span> COINS</p></div>
                <button onclick="playAd()" class="bg-amber-500 text-white px-8 py-3 rounded-2xl font-black text-xs shadow-lg">WATCH</button>
            </div>
        </section>

        <!-- PAYOUT TAB -->
        <section id="tab-payout" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] border border-slate-50 shadow-sm text-center">
                <h2 class="text-2xl font-black text-slate-800 mb-2">Withdraw</h2>
                <p class="text-[10px] text-orange-500 font-black mb-10 uppercase tracking-widest text-center">Minimum Withdrawal: ₹<span id="conf-min">0</span></p>
                <input id="upi-id" type="text" placeholder="UPI ID" class="w-full p-5 bg-slate-50 rounded-2xl mb-4 border-none outline-none font-bold text-center">
                <input id="wdr-amt" type="number" placeholder="Amount (₹)" class="w-full p-5 bg-slate-50 rounded-2xl mb-8 border-none outline-none font-bold text-center">
                <button onclick="requestPayout()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black shadow-xl">REQUEST PAYOUT</button>
            </div>
        </section>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 flex justify-around items-center z-40">
        <button onclick="openTab('home')" id="n-home" class="nav-btn active flex flex-col items-center gap-1"><i class="fas fa-house text-xl"></i><span class="text-[8px] font-black uppercase">Home</span></button>
        <button onclick="openTab('tasks')" id="n-tasks" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><i class="fas fa-play-circle text-xl"></i><span class="text-[8px] font-black uppercase">Ads</span></button>
        <button onclick="openTab('payout')" id="n-payout" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><i class="fas fa-wallet text-xl"></i><span class="text-[8px] font-black uppercase">Payout</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU",
            authDomain: "tasksearningsbot.firebaseapp.com",
            projectId: "tasksearningsbot",
            storageBucket: "tasksearningsbot.firebasestorage.app",
            messagingSenderId: "721160571309",
            appId: "1:721160571309:web:35d389bf57f511e6a73924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let tg = window.Telegram.WebApp;
        let user = null;
        let config = { coin_rate: 100, ads_reward: 10, min_withdrawal: 100 };
        let claimedTasks = new Set();
        let visitedTasks = new Set();

        async function start() {
            tg.expand();
            
            // 1. Load Settings
            db.collection('settings').doc('global').onSnapshot(doc => {
                if(doc.exists) config = doc.data();
                document.getElementById('conf-ad').innerText = config.ads_reward;
                document.getElementById('conf-min').innerText = config.min_withdrawal;
                if(user) renderUI();
            });

            // 2. Load User
            const tgUser = tg.initDataUnsafe?.user || { id: 12345, first_name: "TestUser" };
            const uId = tgUser.id.toString();

            db.collection('users').doc(uId).onSnapshot(snap => {
                if(snap.exists) {
                    user = snap.data();
                    renderUI();
                    loadUserClaims(uId);
                } else {
                    db.collection('users').doc(uId).set({
                        id: tgUser.id, name: tgUser.first_name, photoURL: tgUser.photo_url || `https://ui-avatars.com/api/?name=${tgUser.first_name}`,
                        coins: 0, reffer: 0, totalWithdrawals: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                document.getElementById('loader').classList.add('hidden');
            });
            loadTasks();
        }

        function loadUserClaims(uId) {
            db.collection('user_claims').where('userId', '==', uId).onSnapshot(snap => {
                claimedTasks = new Set(snap.docs.map(d => d.data().taskId));
                loadTasks();
            });
        }

        function renderUI() {
            const rupees = (user.coins / config.coin_rate).toFixed(2);
            document.getElementById('u-name').innerText = user.name;
            document.getElementById('u-pfp').src = user.photoURL;
            document.getElementById('u-coins').innerText = user.coins;
            document.getElementById('u-rupees').innerText = rupees;
        }

        function loadTasks() {
            db.collection('tasks').orderBy('createdAt','desc').onSnapshot(snap => {
                const tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('task-list').innerHTML = tasks.map(t => {
                    const isDone = claimedTasks.has(t.id);
                    const isVisited = visitedTasks.has(t.id);

                    return `
                    <div class="bg-white p-5 rounded-[2rem] flex items-center justify-between border border-slate-50 ${isDone ? 'opacity-50' : ''}">
                        <div class="flex-1 pr-2">
                            <h4 class="font-black text-xs text-slate-800 uppercase">${t.name}</h4>
                            <p class="text-[10px] text-blue-600 font-black">+ ${t.reward} COINS</p>
                        </div>
                        <div class="flex gap-2">
                            ${isDone ? 
                                '<span class="text-[10px] font-bold text-slate-400">COMPLETED</span>' : 
                                (isVisited ? 
                                    `<button onclick="claimTask('${t.id}', ${t.reward})" class="bg-green-500 text-white px-6 py-2 rounded-xl text-[10px] font-black shadow-lg">CLAIM</button>` : 
                                    `<button onclick="visitLink('${t.id}', '${t.link}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black shadow-lg">VISIT</button>`
                                )
                            }
                        </div>
                    </div>`;
                }).join('');
            });
        }

        function visitLink(id, link) {
            window.open(link, '_blank');
            visitedTasks.add(id);
            loadTasks(); // Button switch karne ke liye
            Swal.fire({ title: 'Task Visited!', text: 'Wapas aa kar Claim par click karein', icon: 'success', toast: true, position: 'top', timer: 3000 });
        }

        async function claimTask(taskId, reward) {
            const uId = user.id.toString();
            const claimId = `${uId}_${taskId}`;
            
            // UI Loader
            Swal.fire({ title: 'Claiming...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const claimRef = db.collection('user_claims').doc(claimId);
                const userRef = db.collection('users').doc(uId);

                await db.runTransaction(async (transaction) => {
                    const claimDoc = await transaction.get(claimRef);
                    if (claimDoc.exists) throw "Pehle hi claim kar liya hai!";

                    transaction.set(claimRef, {
                        userId: uId,
                        taskId: taskId,
                        claimedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    transaction.update(userRef, {
                        coins: firebase.firestore.FieldValue.increment(reward)
                    });
                });

                Swal.fire({ icon: 'success', title: 'Coins Added!', text: `+${reward} coins received`, toast: true, position: 'top' });
            } catch (e) {
                Swal.fire('Error', e.toString(), 'error');
            }
        }

        async function playAd() {
            if (typeof show_11003643 === 'function') {
                show_11003643().then(async () => {
                    await db.collection('users').doc(user.id.toString()).update({ coins: firebase.firestore.FieldValue.increment(config.ads_reward) });
                    Swal.fire({ icon: 'success', title: 'Ad Reward Added!', toast: true, position: 'top' });
                });
            } else Swal.fire('Error', 'Ads not ready', 'error');
        }

        async function requestPayout() {
            const upi = document.getElementById('upi-id').value;
            const amt = parseFloat(document.getElementById('wdr-amt').value);
            const userRupees = user.coins / config.coin_rate;
            if(!upi || amt < config.min_withdrawal) return Swal.fire('Wait!', `Min withdrawal ₹${config.min_withdrawal}`, 'warning');
            if(amt > userRupees) return Swal.fire('Error', 'Insufficient Balance', 'error');

            const batch = db.batch();
            batch.set(db.collection('withdrawals').doc(), { userId: user.id, upi, amount: amt, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            batch.update(db.collection('users').doc(user.id.toString()), { coins: firebase.firestore.FieldValue.increment(-(amt * config.coin_rate)), totalWithdrawals: firebase.firestore.FieldValue.increment(amt) });
            await batch.commit();
            Swal.fire('Success', 'Request Sent!', 'success');
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-blue-600'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`n-${id}`).classList.add('active', 'text-blue-600');
        }

        function copyRef() {
            const link = `https://t.me/Tasks_earnings_bot?start=${user.id}`;
            navigator.clipboard.writeText(link);
            Swal.fire({ icon: 'success', title: 'Copied!', toast: true, position: 'top' });
        }

        window.onload = start;
    </script>
</body>
</html>
