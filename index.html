<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasks Earnings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- 🔥 ADS SDK INTEGRATION -->
    <script src='//libtl.com/sdk.js' data-zone='11003643' data-sdk='show_11003643'></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; padding-bottom: 80px; }
        .tab-content { display: none; animation: slideUp 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #2563eb; }
    </style>
</head>
<body>
    <div id="loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-bold">Syncing App...</p>
    </div>

    <div class="p-4 max-w-md mx-auto">
        <!-- HEADER -->
        <div class="flex items-center gap-4 mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-50">
            <img id="u-pfp" src="" class="w-12 h-12 rounded-full ring-2 ring-blue-100">
            <div>
                <h2 id="u-name" class="font-bold text-gray-800 tracking-tight">Loading...</h2>
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest"><span id="u-coins">0</span> Coins</p>
            </div>
        </div>

        <!-- TAB: HOME -->
        <section id="tab-home" class="tab-content active">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Rupees Balance</p>
                    <h3 class="text-2xl font-black text-blue-600">₹<span id="u-rupees">0</span></h3>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Invites</p>
                    <h3 class="text-2xl font-black text-slate-800" id="u-refs">0</h3>
                </div>
            </div>

            <div class="bg-blue-600 rounded-3xl p-6 text-white shadow-xl mb-6">
                <h4 class="font-bold text-sm mb-1">Invite Friends & Earn</h4>
                <p class="text-[10px] opacity-80 mb-4">Har referral par 500 coins payein.</p>
                <button onclick="copyRef()" class="w-full bg-white text-blue-600 py-3 rounded-2xl text-xs font-bold shadow-md active:scale-95 transition">COPY INVITE LINK</button>
            </div>

            <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3 ml-2 tracking-widest">Recommended Tasks</h4>
            <div id="quick-tasks" class="space-y-3"></div>
        </section>

        <!-- TAB: TASKS -->
        <section id="tab-tasks" class="tab-content">
            <h2 class="text-xl font-black text-slate-800 mb-4">Earn Money</h2>
            <!-- 🔥 AD CARD -->
            <div class="bg-amber-50 border-2 border-dashed border-amber-300 p-5 rounded-3xl mb-6 flex items-center justify-between">
                <div>
                    <h4 class="font-bold text-amber-900">Rewarded Video</h4>
                    <p class="text-xs text-amber-700">+ <span id="conf-ad-reward">10</span> Coins per ad</p>
                </div>
                <button onclick="playAd()" class="bg-amber-500 text-white px-6 py-2.5 rounded-2xl font-bold text-xs shadow-md active:scale-90 transition">WATCH</button>
            </div>
            <div id="task-list" class="space-y-4"></div>
        </section>

        <!-- TAB: PAYOUT -->
        <section id="tab-payout" class="tab-content text-center">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-wallet text-2xl"></i></div>
                <h2 class="text-xl font-black text-slate-800 mb-2">Withdraw</h2>
                <p class="text-xs text-slate-400 font-medium mb-6">Min withdrawal: ₹<span id="conf-min-wdr">100</span></p>
                
                <input id="upi-id" type="text" placeholder="UPI ID (example@upi)" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none text-sm font-bold border-2 border-transparent focus:border-blue-500">
                <input id="wdr-amt" type="number" placeholder="Amount in ₹" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none text-sm font-bold border-2 border-transparent focus:border-blue-500">
                
                <button onclick="requestPayout()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition">SUBMIT WITHDRAWAL</button>
            </div>
        </section>

        <!-- TAB: ME -->
        <section id="tab-me" class="tab-content text-center">
            <img id="u-pfp-lg" src="" class="w-20 h-20 rounded-full mx-auto mb-4 shadow-xl">
            <h3 id="u-name-lg" class="text-xl font-bold text-slate-800">...</h3>
            <p class="text-xs text-slate-400 mb-8">UID: <span id="u-id">...</span></p>
            <div class="bg-white p-2 rounded-3xl divide-y">
                <div class="flex justify-between p-4"><span class="text-gray-400 text-xs font-bold uppercase">Coins</span><span class="font-bold text-slate-800" id="m-coins">0</span></div>
                <div class="flex justify-between p-4"><span class="text-gray-400 text-xs font-bold uppercase">Rupees</span><span class="font-bold text-green-600">₹<span id="m-rupees">0</span></span></div>
            </div>
        </section>
    </div>

    <!-- NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-3 flex justify-around items-center z-40">
        <button onclick="openTab('home')" id="n-home" class="nav-btn active flex flex-col items-center gap-1"><i class="fas fa-house text-lg"></i><span class="text-[9px] font-bold uppercase">Home</span></button>
        <button onclick="openTab('tasks')" id="n-tasks" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><i class="fas fa-bolt text-lg"></i><span class="text-[9px] font-bold uppercase">Tasks</span></button>
        <button onclick="openTab('payout')" id="n-payout" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><i class="fas fa-wallet text-lg"></i><span class="text-[9px] font-bold uppercase">Payout</span></button>
        <button onclick="openTab('me')" id="n-me" class="nav-btn text-slate-300 flex flex-col items-center gap-1"><i class="fas fa-user text-lg"></i><span class="text-[9px] font-bold uppercase">Profile</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU",
            authDomain: "tasksearningsbot.firebaseapp.com",
            projectId: "tasksearningsbot",
            storageBucket: "tasksearningsbot.firebasestorage.app",
            messagingSenderId: "721160571309",
            appId: "1:721160571309:web:35d389bf57f511e6a73924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let tg = window.Telegram.WebApp;
        let user = null;
        let config = { coin_rate: 100, ads_reward: 10, min_withdrawal: 100 };

        async function start() {
            tg.expand();
            db.collection('settings').doc('global').onSnapshot(doc => {
                if(doc.exists) config = doc.data();
                document.getElementById('conf-ad-reward').innerText = config.ads_reward;
                document.getElementById('conf-min-wdr').innerText = config.min_withdrawal;
                if(user) renderUI();
            });

            const tgUser = tg.initDataUnsafe?.user || { id: 1234, first_name: "User" };
            const refBy = tg.initDataUnsafe?.start_param || null;

            const uRef = db.collection('users').doc(tgUser.id.toString());
            uRef.onSnapshot(snap => {
                if(snap.exists) {
                    user = snap.data();
                    renderUI();
                } else {
                    uRef.set({
                        id: tgUser.id, name: tgUser.first_name, photoURL: tgUser.photo_url || `https://ui-avatars.com/api/?name=${tgUser.first_name}`,
                        coins: 0, reffer: 0, refferBy: refBy, totalWithdrawals: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                document.getElementById('loader').classList.add('hidden');
            });
            loadTasks();
        }

        function renderUI() {
            const rupees = (user.coins / config.coin_rate).toFixed(2);
            document.getElementById('u-name').innerText = user.name;
            document.getElementById('u-pfp').src = user.photoURL;
            document.getElementById('u-coins').innerText = user.coins;
            document.getElementById('u-rupees').innerText = rupees;
            document.getElementById('u-refs').innerText = user.reffer;
            document.getElementById('u-pfp-lg').src = user.photoURL;
            document.getElementById('u-name-lg').innerText = user.name;
            document.getElementById('u-id').innerText = user.id;
            document.getElementById('m-coins').innerText = user.coins;
            document.getElementById('m-rupees').innerText = rupees;
        }

        function loadTasks() {
            db.collection('tasks').onSnapshot(snap => {
                const tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const html = tasks.map(t => `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-50">
                        <div>
                            <h4 class="font-bold text-xs text-slate-800">${t.name}</h4>
                            <p class="text-[10px] text-green-600 font-bold">+ ${t.reward} Coins</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.open('${t.link}')" class="bg-slate-100 text-slate-500 px-4 py-1.5 rounded-xl text-[10px] font-bold">GO</button>
                            <button onclick="claim('${t.id}', ${t.reward})" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold shadow-md">CLAIM</button>
                        </div>
                    </div>`).join('');
                document.getElementById('task-list').innerHTML = html;
                document.getElementById('quick-tasks').innerHTML = html;
            });
        }

        // 🔥 REAL REWARDED AD FUNCTION
        async function playAd() {
            if (typeof show_11003643 === 'function') {
                show_11003643().then(async () => {
                    // This runs only after ad success
                    await db.collection('users').doc(user.id.toString()).update({
                        coins: firebase.firestore.FieldValue.increment(config.ads_reward)
                    });
                    Swal.fire({ icon: 'success', title: `+${config.ads_reward} Coins Added!`, toast: true, position: 'top', timer: 3000 });
                }).catch(err => {
                    Swal.fire('Error', 'Ad failed to load. Try again.', 'error');
                });
            } else {
                Swal.fire('Wait', 'Ad System is loading, try in 2 seconds.', 'warning');
            }
        }

        async function requestPayout() {
            const upi = document.getElementById('upi-id').value;
            const amt = parseFloat(document.getElementById('wdr-amt').value);
            const userRupees = user.coins / config.coin_rate;

            if(!upi || isNaN(amt) || amt < config.min_withdrawal) return Swal.fire('Error', `Minimum is ₹${config.min_withdrawal}`, 'warning');
            if(amt > userRupees) return Swal.fire('Error', 'Insufficient Balance', 'error');

            const coinsToDeduct = amt * config.coin_rate;
            const batch = db.batch();
            batch.set(db.collection('withdrawals').doc(), { userId: user.id, upi, amount: amt, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            batch.update(db.collection('users').doc(user.id.toString()), { coins: firebase.firestore.FieldValue.increment(-coinsToDeduct), totalWithdrawals: firebase.firestore.FieldValue.increment(amt) });
            await batch.commit();
            Swal.fire('Success', 'Request Sent!', 'success');
        }

        async function claim(id, reward) {
            await db.collection('users').doc(user.id.toString()).update({ coins: firebase.firestore.FieldValue.increment(reward) });
            Swal.fire({ icon: 'success', title: 'Claimed!', toast: true, position: 'top', timer: 2000 });
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-blue-600'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-slate-300'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`n-${id}`).classList.add('active', 'text-blue-600');
            document.getElementById(`n-${id}`).classList.remove('text-slate-300');
        }

        function copyRef() {
            const link = `https://t.me/Tasks_earnings_bot?start=${user.id}`;
            navigator.clipboard.writeText(link);
            Swal.fire({ icon: 'success', title: 'Link Copied!', toast: true, position: 'top', timer: 2000 });
        }

        window.onload = start;
    </script>
</body>
</html>
