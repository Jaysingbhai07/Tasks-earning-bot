<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasks Earnings - User Panel</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; user-select: none; padding-bottom: 90px; }
        .tab-content { display: none; animation: slideUp 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .nav-active { color: #2563eb; transform: translateY(-3px); transition: all 0.3s; }
        .nav-active i { color: #2563eb; }
    </style>
</head>
<body>

    <div id="loading-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-blue-600 font-medium">Loading Settings...</p>
    </div>

    <div class="max-w-md mx-auto p-4">
        
        <!-- DASHBOARD -->
        <section id="tab-dashboard" class="tab-content active">
            <header class="flex items-center gap-4 mb-6">
                <img id="u-photo" src="" class="w-14 h-14 rounded-full ring-4 ring-white shadow-md">
                <div>
                    <h2 id="u-name" class="font-bold text-lg text-gray-800 leading-tight">User</h2>
                    <p class="text-xs text-gray-500 font-medium">Balance: <span class="text-blue-600" id="s-coins">0</span> Coins</p>
                </div>
            </header>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="glass p-4 rounded-2xl shadow-sm text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Total ₹</p>
                    <h3 class="text-xl font-black text-blue-600">₹<span id="s-rupees">0</span></h3>
                </div>
                <div class="glass p-4 rounded-2xl shadow-sm text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Referrals</p>
                    <h3 class="text-xl font-black text-gray-800"><span id="s-refs">0</span></h3>
                </div>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg mb-6">
                <h4 class="font-bold mb-1 italic">Invite & Earn</h4>
                <div class="flex bg-white/10 p-2 rounded-xl items-center gap-2 border border-white/20 mt-3">
                    <input id="ref-link" type="text" readonly class="bg-transparent border-none text-[10px] flex-1 outline-none truncate" value="">
                    <button onclick="copyRef()" class="bg-white text-blue-700 px-4 py-1.5 rounded-lg text-[10px] font-bold">COPY</button>
                </div>
            </div>

            <div id="quick-tasks" class="space-y-3"></div>
        </section>

        <!-- TASKS -->
        <section id="tab-tasks" class="tab-content">
            <h2 class="text-xl font-black mb-4">Earn Coins</h2>
            <div class="bg-amber-50 border-2 border-dashed border-amber-300 p-4 rounded-2xl mb-5 flex items-center justify-between">
                <div>
                    <h4 class="font-bold text-amber-900 text-sm">Watch Video Ad</h4>
                    <p class="text-[10px] text-amber-700">+<span id="ad-reward-val">0</span> Coins</p>
                </div>
                <button onclick="watchAd()" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">WATCH</button>
            </div>
            <div id="all-tasks" class="space-y-4"></div>
        </section>

        <!-- WITHDRAW -->
        <section id="tab-withdraw" class="tab-content">
            <h2 class="text-xl font-black mb-4">Withdraw</h2>
            <div class="glass p-5 rounded-2xl mb-6 shadow-sm">
                <p class="text-[10px] text-center font-bold text-orange-500 mb-4 uppercase">Min Withdrawal: ₹<span id="min-wdr-val">0</span></p>
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">UPI ID</label>
                    <input id="upi-id" type="text" placeholder="example@upi" class="w-full mt-1 p-3.5 bg-gray-50 rounded-xl border outline-none text-sm">
                </div>
                <div class="mb-5">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Amount (₹)</label>
                    <input id="with-amount" type="number" class="w-full mt-1 p-3.5 bg-gray-50 rounded-xl border outline-none text-sm">
                </div>
                <button onclick="processWithdraw()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">Request Payout</button>
            </div>
        </section>

        <!-- PROFILE -->
        <section id="tab-profile" class="tab-content">
            <div class="flex flex-col items-center py-6">
                <img id="p-photo" src="" class="w-20 h-20 rounded-full shadow-xl mb-4">
                <h3 id="p-name" class="text-xl font-bold">...</h3>
                <p class="text-xs text-gray-400">UID: <span id="p-id">...</span></p>
            </div>
            <div class="glass rounded-2xl p-4 divide-y">
                <div class="flex justify-between py-3"><span class="text-gray-500 text-sm">Total Coins</span><span class="font-bold" id="p-coins">0</span></div>
                <div class="flex justify-between py-3"><span class="text-gray-500 text-sm">Rupee Value</span><span class="font-bold text-green-600">₹<span id="p-rupees">0</span></span></div>
            </div>
        </section>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center z-50">
        <button onclick="switchTab('dashboard')" id="btn-dashboard" class="flex flex-col items-center gap-1 nav-active"><i class="fas fa-home text-lg"></i><span class="text-[9px] font-bold">Home</span></button>
        <button onclick="switchTab('tasks')" id="btn-tasks" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-tasks text-lg"></i><span class="text-[9px] font-bold">Tasks</span></button>
        <button onclick="switchTab('withdraw')" id="btn-withdraw" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-wallet text-lg"></i><span class="text-[9px] font-bold">Payout</span></button>
        <button onclick="switchTab('profile')" id="btn-profile" class="flex flex-col items-center gap-1 text-gray-400"><i class="fas fa-user text-lg"></i><span class="text-[9px] font-bold">Me</span></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqNPQfhPHqZuhZM2zzGQnf4f53Sw-jrU",
            authDomain: "tasksearningsbot.firebaseapp.com",
            projectId: "tasksearningsbot",
            storageBucket: "tasksearningsbot.firebasestorage.app",
            messagingSenderId: "721160571309",
            appId: "1:721160571309:web:35d389bf57f511e6a73924"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tg = window.Telegram.WebApp;
        let currentUser = null;
        let globalSettings = { coin_rate: 100, ads_reward: 50, min_withdrawal: 100 };

        async function init() {
            tg.expand();
            
            // 1. Fetch Global Settings First
            db.collection('settings').doc('global').onSnapshot(doc => {
                if(doc.exists) {
                    globalSettings = doc.data();
                    document.getElementById('ad-reward-val').innerText = globalSettings.ads_reward;
                    document.getElementById('min-wdr-val').innerText = globalSettings.min_withdrawal;
                    if(currentUser) updateUserUI(); // Refresh UI with new rates
                }
            });

            const user = tg.initDataUnsafe?.user || { id: 12345, first_name: "Test User", photo_url: "" };
            const startParam = tg.initDataUnsafe?.start_param || null;
            
            // 2. Sync User
            const userRef = db.collection('users').doc(user.id.toString());
            userRef.onSnapshot(snap => {
                if(snap.exists) {
                    currentUser = snap.data();
                    updateUserUI();
                } else {
                    userRef.set({
                        id: user.id, name: user.first_name, photoURL: user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}`,
                        coins: 0, reffer: 0, refferBy: startParam, tasksCompleted: 0, totalWithdrawals: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                document.getElementById('loading-screen').classList.add('hidden');
            });

            loadTasks();
        }

        function updateUserUI() {
            const rupeeBalance = (currentUser.coins / globalSettings.coin_rate).toFixed(2);
            
            document.getElementById('u-name').innerText = currentUser.name;
            document.getElementById('u-photo').src = currentUser.photoURL;
            document.getElementById('s-coins').innerText = currentUser.coins;
            document.getElementById('s-rupees').innerText = rupeeBalance;
            document.getElementById('s-refs').innerText = currentUser.reffer;
            
            document.getElementById('p-name').innerText = currentUser.name;
            document.getElementById('p-id').innerText = currentUser.id;
            document.getElementById('p-photo').src = currentUser.photoURL;
            document.getElementById('p-coins').innerText = currentUser.coins;
            document.getElementById('p-rupees').innerText = rupeeBalance;

            document.getElementById('ref-link').value = `https://t.me/Tasks_earnings_bot?start=${currentUser.id}`;
        }

        function loadTasks() {
            db.collection('tasks').onSnapshot(snap => {
                const list = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                const cont = document.getElementById('all-tasks');
                cont.innerHTML = list.map(t => `
                    <div class="glass p-4 rounded-2xl flex items-center justify-between">
                        <div>
                            <h4 class="font-bold text-sm text-gray-800">${t.name}</h4>
                            <p class="text-green-600 font-bold text-xs">+ ${t.reward} Coins</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.open('${t.link}')" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg text-[10px] font-bold">VISIT</button>
                            <button onclick="claim('${t.id}', ${t.reward})" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold">CLAIM</button>
                        </div>
                    </div>`).join('');
            });
        }

        async function watchAd() {
            Swal.fire({ title: 'Ad Playing...', timer: 5000, showConfirmButton: false, didOpen: () => { Swal.showLoading() } });
            setTimeout(async () => {
                await db.collection('users').doc(currentUser.id.toString()).update({
                    coins: firebase.firestore.FieldValue.increment(globalSettings.ads_reward)
                });
                Swal.fire({ icon: 'success', title: `+${globalSettings.ads_reward} Coins!`, toast: true, position: 'top' });
            }, 5000);
        }

        async function processWithdraw() {
            const upi = document.getElementById('upi-id').value;
            const amt = parseFloat(document.getElementById('with-amount').value);
            const userRupees = currentUser.coins / globalSettings.coin_rate;

            if(!upi || amt < globalSettings.min_withdrawal) {
                return Swal.fire('Error', `Minimum withdrawal is ₹${globalSettings.min_withdrawal}`, 'error');
            }
            if(userRupees < amt) {
                return Swal.fire('Error', 'Insufficient balance!', 'error');
            }

            const coinsToDeduct = amt * globalSettings.coin_rate;
            const batch = db.batch();
            const wRef = db.collection('withdrawals').doc();
            batch.set(wRef, { userId: currentUser.id, upi, amount: amt, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            batch.update(db.collection('users').doc(currentUser.id.toString()), {
                coins: firebase.firestore.FieldValue.increment(-coinsToDeduct),
                totalWithdrawals: firebase.firestore.FieldValue.increment(amt)
            });
            await batch.commit();
            Swal.fire('Success', 'Payout request sent!', 'success');
        }

        async function claim(id, reward) {
            await db.collection('users').doc(currentUser.id.toString()).update({
                coins: firebase.firestore.FieldValue.increment(reward)
            });
            Swal.fire({ icon: 'success', title: 'Coins Added!', toast: true, position: 'top' });
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-blue-600'));
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`btn-${id}`).classList.add('nav-active', 'text-blue-600');
        }

        function copyRef() {
            const link = document.getElementById('ref-link').value;
            navigator.clipboard.writeText(link);
            Swal.fire({ icon: 'success', title: 'Copied!', toast: true, position: 'top' });
        }

        window.onload = init;
    </script>
</body>
</html>
